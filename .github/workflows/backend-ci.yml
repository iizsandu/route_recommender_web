name: Backend CI

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      # Dummy values so pydantic Settings() does not raise ValidationError
      # when routing.py and config.py import at module level during pytest.
      COSMOS_CONNECTION_STRING: "AccountEndpoint=https://dummy.documents.azure.com:443/;AccountKey=ZHVtbXk=;"
      ORS_API_KEY: dummy-ors-key
      KDE_ARTIFACTS_DIR: /tmp/fake-kde-artifacts
      BAND_LOW_THRESHOLD: "0.07"
      BAND_HIGH_THRESHOLD: "0.91"
      MLFLOW_TRACKING_URI: "sqlite:///tmp/mlruns.db"
      MLFLOW_REGISTRY_URI: "sqlite:///tmp/mlruns.db"
      ALLOWED_ORIGINS: "http://localhost:3000"
      LOG_FORMAT: console

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short
